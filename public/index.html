<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>China VPN Status</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f6f7f4;
        --surface: #ffffff;
        --text: #17201b;
        --muted: #66726b;
        --line: #d9ded8;
        --accent: #146c5f;
        --warning: #9b4f19;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--background);
      }

      main {
        width: min(840px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .statusPanel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 28px;
      }

      .statusBadge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--accent);
        font-size: 14px;
        font-weight: 700;
      }

      .statusDot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--accent);
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(32px, 6vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 680px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .notice {
        margin-top: 28px;
        border-left: 4px solid var(--warning);
        padding: 12px 0 12px 16px;
        color: var(--warning);
        font-weight: 700;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 28px;
      }

      .metaItem {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .metaLabel {
        color: var(--muted);
        font-size: 13px;
      }

      .metaValue {
        margin-top: 8px;
        font-size: 16px;
        font-weight: 800;
      }

      @media (max-width: 640px) {
        main {
          width: min(100% - 24px, 840px);
          padding: 24px 0;
        }

        .statusPanel {
          padding: 20px;
        }

        .meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="statusPanel" aria-labelledby="pageTitle">
        <div class="statusBadge">
          <span class="statusDot" aria-hidden="true"></span>
          私人服务状态页
        </div>
        <h1 id="pageTitle">China VPN</h1>
        <p>
          这是个人自用 VPN 的低权限公网入口。公网页面只提供状态与说明，不提供设备新增、密钥生成、配置下载或管理操作。
        </p>
        <div class="notice">如需管理设备，请先连接 VPN，再访问内网管理入口。</div>
        <div class="meta" aria-label="服务边界">
          <div class="metaItem">
            <div class="metaLabel">公网能力</div>
            <div class="metaValue">只读状态</div>
          </div>
          <div class="metaItem">
            <div class="metaLabel">管理入口</div>
            <div class="metaValue">VPN 内网</div>
          </div>
          <div class="metaItem">
            <div class="metaLabel">密钥处理</div>
            <div class="metaValue">不在公网展示</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
